<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<title>git·analyzer — Dashboard</title>
<link rel="stylesheet" href="dashboard.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="AdvancedCharts.jsx"></script>
<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="MiddleSections.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script>
/* Motion safety net.
   The chart entrance animations are CSS keyframes that begin from a hidden
   state (opacity:0 / strokeDashoffset / width:0). Some preview/embed harnesses
   suspend CSS animations AND requestAnimationFrame while still reporting the
   page as "visible" — which would leave charts stuck empty. setTimeout keeps
   firing in those contexts, so we use it to force charts to their final state
   when motion isn't live. In a real browser tab the animations play normally
   and this only runs as a harmless post-completion safety pass. */
(function () {
  function forceFinal(root) {
    if (!root) return;
    // cards: cancel entrance, show
    root.querySelectorAll('.card').forEach(function (c) {
      c.style.animation = 'none'; c.style.opacity = '1'; c.style.transform = 'none';
    });
    // bar fills carry a --final custom property
    root.querySelectorAll('[style*="--final"]').forEach(function (b) {
      b.style.animation = 'none';
      var f = getComputedStyle(b).getPropertyValue('--final');
      if (f) b.style.width = f.trim();
    });
    // animated SVG primitives
    root.querySelectorAll('svg path, svg circle, svg polygon, svg rect, svg line').forEach(function (el) {
      var s = el.getAttribute('style') || '';
      if (s.indexOf('animation') !== -1) {
        el.style.animation = 'none';
        el.style.opacity = '1';
        el.style.strokeDashoffset = '0';
        el.style.transform = 'none';
      }
    });
  }

  var root = document.getElementById('root');
  var live = false;
  requestAnimationFrame(function () { live = true; });

  // If rAF never fired (~300ms), motion is suspended → force charts visible now
  // and on every re-render (section switches mutate #root).
  setTimeout(function () {
    if (live) return;                 // real tab: let animations play
    forceFinal(root);
    new MutationObserver(function () { forceFinal(root); }).observe(root, { childList: true, subtree: true });
  }, 300);

  // Unconditional post-completion safety: by 5s every entrance has finished,
  // so forcing final state is a no-op in a real tab but rescues any edge case.
  setTimeout(function () { forceFinal(root); }, 5000);
})();
</script>
</body>
</html>
